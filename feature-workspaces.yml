# Feature workspace lifecycle contract
# Stable dev/test/prod environments remain owned by terraform/ and deploy_to_fabric.py.

branch_patterns:
  - "feature/**"
  - "bugfix/**"

workspace_name_template: "[{branch_prefix}] {workspace_folder} ({branch_slug}-{hash8})"
capacity_id: "00000000-0000-0000-0000-000000000000"

git:
  provider_type: "GitHub"
  repository:
    owner: "your-github-owner"
    name: "dc-fabric-cicd"
  connection_name: "github-default"
  # connection_id: "00000000-0000-0000-0000-000000000000"

permissions:
  - principal_id: "<entra_admin_group_object_id>"
    role: "Admin"

cleanup:
  delete_on_pr_close: true
  delete_on_branch_delete: true
